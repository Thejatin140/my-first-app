name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Wrapper (गायब gradlew फ़ाइल बनाने के लिए)
      run: gradle wrapper

    - name: Fix Signing Config Error (README की शर्त पूरी करने के लिए)
      run: sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")//g' app/build.gradle.kts || true

    - name: Create .env file for Gemini API
      run: echo "GEMINI_API_KEY=DUMMY_KEY_FOR_BUILD" > .env

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
